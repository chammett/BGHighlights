name: Package and Release

on:
  push:
    tags:
      - '**'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run BigWigs Packager
        uses: BigWigsMods/packager@v2
        env:
          
          CF_API_KEY: ${{ secrets.CF_API_KEY }}